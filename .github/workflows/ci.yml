name: CI

on:
  pull_request:
    branches: [master]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - name: Run ruff format
        run: uv run ruff format .
      - name: Check diff
        run: |
          git diff --exit-code || (
            echo "::error::Files need formatting. Run 'ruff format .' and commit changes."
            exit 1
          )

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - name: Run ruff check
        run: uv run ruff check .

  ty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache uv & models
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/uv
            ~/.cache/huggingface
            ~/.cache/torch
          key: deps-${{ hashFiles('uv.lock') }}
          restore-keys: deps-
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev,torch
      - name: Run ty
        run: uv run ty check src

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache uv & models
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/uv
            ~/.cache/huggingface
            ~/.cache/torch
          key: deps-${{ hashFiles('uv.lock') }}
          restore-keys: deps-
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra torch,test
      - name: Run tests
        run: uv run pytest tests/
